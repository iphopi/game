<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name=viewport content="width=device-width,initial-scale=1.0"><title>Game không hoạt động</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel=stylesheet><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;font-family:Inter,sans-serif;position:relative;background:radial-gradient(circle at top left,#60a5fa33,transparent 35%),radial-gradient(circle at bottom right,#a855f733,transparent 35%),radial-gradient(circle at center,#fff,#eef2ff)}body::before{content:'';position:absolute;width:140vw;height:140vw;background:conic-gradient(from 0deg,#60a5fa55,#8b5cf655,#ec489955,#60a5fa55);animation:spinAurora 20s linear infinite;filter:blur(90px)}@keyframes spinAurora{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.shapes{position:absolute;inset:0;overflow:hidden}.shape{position:absolute;border-radius:50%;filter:blur(5px);opacity:.3;animation:moveX 12s infinite alternate ease-in-out,moveY 18s infinite alternate linear}.shape-1{width:320px;height:320px;background:#3b82f6;top:5%;left:5%}.shape-2{width:220px;height:220px;background:#8b5cf6;bottom:5%;left:10%}.shape-3{width:150px;height:150px;background:#ec4899;top:20%;right:15%}.shape-4{width:260px;height:260px;background:#22c55e;bottom:10%;right:10%}.shape-5{width:130px;height:130px;background:#f59e0b;top:60%;left:50%}.shape-6{width:180px;height:180px;background:#ef4444;top:40%;left:30%}@keyframes moveX{from{transform:translateX(-120px)}to{transform:translateX(120px)}}@keyframes moveY{from{transform:translateY(-80px)}to{transform:translateY(120px)}}.particles{position:absolute;inset:0;background-image:radial-gradient(#ffffffaa 1px,transparent 1px);background-size:30px 30px;opacity:.35;animation:moveParticles 30s linear infinite}@keyframes moveParticles{from{transform:translateY(0)}to{transform:translateY(-200px)}}.card{position:relative;z-index:5;width:100%;max-width:540px;padding:50px 40px;border-radius:40px;background:rgba(255,255,255,0.18);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.25);box-shadow:0 10px 40px rgba(0,0,0,0.12),inset 0 1px 1px rgba(255,255,255,0.5);overflow:hidden;text-align:center;transition:.4s}.card::before{content:'';position:absolute;inset:-2px;border-radius:inherit;background:linear-gradient(135deg,#60a5fa,#8b5cf6,#ec4899);z-index:-1;filter:blur(25px);opacity:.35}.card:hover{transform:translateY(-8px) scale(1.01);box-shadow:0 25px 60px rgba(99,102,241,.25)}.broken-icon{margin-bottom:28px;display:flex;justify-content:center;animation:floatIcon 4s ease-in-out infinite}@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}.error-file-svg{width:130px}h1{font-size:34px;font-weight:800;margin-bottom:14px;background:linear-gradient(135deg,#1e293b,#2563eb,#9333ea);-webkit-background-clip:text;color:transparent}.msg{color:#475569;line-height:1.7;font-size:16px;margin-bottom:24px}.badge{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:999px;background:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.4);backdrop-filter:blur(1px);font-size:13px;font-weight:700;color:#7c3aed;letter-spacing:1px;box-shadow:0 8px 24px rgba(139,92,246,.15)}@media(max-width:600px){.card{margin:20px;padding:40px 25px;border-radius:32px}h1{font-size:28px}.msg{font-size:14px}.error-file-svg{width:110px}}</style></head><body><div class=particles></div><div class=shapes><div class="shape shape-1"></div><div class="shape shape-2"></div><div class="shape shape-3"></div><div class="shape shape-4"></div><div class="shape shape-5"></div><div class="shape shape-6"></div></div><div class=card><div class=broken-icon><svg class=error-file-svg viewBox="0 0 140 160" fill=none><defs><linearGradient id=fileGrad x1=0% y1=0% x2=0% y2=100%><stop offset=0% stop-color=#ffffff/><stop offset=100% stop-color=#ffe4e4/></linearGradient><linearGradient id=dangerGrad x1=0% y1=0% x2=100% y2=100%><stop offset=0% stop-color=#ff6b6b/><stop offset=100% stop-color=#ef4444/></linearGradient><filter id=neonGlow><feGaussianBlur stdDeviation=4 result=blur/><feMerge><feMergeNode in=blur/><feMergeNode in=SourceGraphic/></feMerge></filter></defs><path d="M30 10H82L110 38V135C110 143 104 149 96 149H30C22 149 16 143 16 135V24C16 22 22 10 30 10Z" fill=url(#fileGrad) stroke=#ffffff stroke-width=2 filter=url(#neonGlow)/><path d="M82 10V38H110" stroke=#ef4444 stroke-width=3 stroke-linejoin=round/><rect x=35 y=58 width=45 height=5 rx=3 fill=#cbd5e1/><rect x=35 y=72 width=55 height=5 rx=3 fill=#dbe4ef/><rect x=35 y=86 width=40 height=5 rx=3 fill=#e2e8f0/><circle cx=70 cy=118 r=24 fill=url(#dangerGrad) filter=url(#neonGlow)/><rect x=66 y=103 width=8 height=22 rx=4 fill=white/><circle cx=70 cy=132 r=4 fill=white/><circle cx=70 cy=118 r=32 stroke=#ff8a8a stroke-width=2 opacity=.4><animate attributeName=r values="32;40;32" dur=2s repeatCount=indefinite/><animate attributeName=opacity values=".4;0;.4" dur=2s repeatCount=indefinite/></circle></svg></div><h1>Thông Báo</h1><p class=msg>Trò chơi của chúng tôi hiện đang phát triển.</p><div class=badge>TikTok:@ip_hopi</div></div></body></html>
